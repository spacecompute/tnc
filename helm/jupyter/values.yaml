replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/jupyter
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: jupyter.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
