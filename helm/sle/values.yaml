replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/sle
  tag: latest
  pullPolicy: IfNotPresent

command: ["/entrypoint.sh"]

entrypoint: |
  #!/usr/bin/env bash
  cd /opt/jsle
  mvn ${MAVEN_HTTPS_PROXY} exec:java -Dmaven.repo.local=/opt/jsle/.m2/repository

env:
  MAVEN_HTTPS_PROXY: ""
  HTTPS_PROXY: ""
  HTTP_PROXY: ""
  NO_PROXY: ""
  DEPLOYMENT_ENVIRO: ""

service:
  type: ClusterIP
  port: 5100
  additionalPorts: []

# Volumes — each entry supports:
#   enabled:     bool (default false)
#   mountPath:   container path (required)
#   type:        emptyDir | pvc | configMap (default emptyDir)
#   subPath:     single-file mount key (optional)
#   size:        PVC size (pvc type, default 100Mi)
#   accessMode:  PVC access mode (pvc type, default ReadWriteOnce)
#   defaultMode: file permissions (configMap type, optional)
#   data:        inline content map (configMap type, optional)
volumes: {}

healthCheck: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sle.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
