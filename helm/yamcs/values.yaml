replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/yamcs
  tag: latest
  pullPolicy: IfNotPresent

command: ["/entrypoint.sh"]

entrypoint: |
  #!/usr/bin/env bash
  set -e
  pkill -f 'yamcs' 2>/dev/null || true
  [ -n "${SHARED_GID}" ] && umask 0002
  cd /opt/yamcs

  # Wait for mission data (MDB, etc/ copied post-deploy via kubectl cp)
  echo "Waiting for mission configuration..."
  for i in $(seq 1 90); do
    if ls mdb/*.xtce >/dev/null 2>&1; then
      echo "Mission data found."
      break
    fi
    if [ "$i" -eq 90 ]; then
      echo "ERROR: MDB files not found after 3 minutes."
      exit 1
    fi
    sleep 2
  done

  # Compile mission-specific decoders into a JAR (if decoder sources are mounted)
  if [ -d /opt/yamcs/decoders ] && ls /opt/yamcs/decoders/*.java 1>/dev/null 2>&1; then
    echo "Compiling mission decoders..."
    BUILD_DIR=/tmp/decoder-build
    rm -rf ${BUILD_DIR}
    mkdir -p ${BUILD_DIR}/META-INF/services
    echo "com.example.myproject.JupyterPlugin" > ${BUILD_DIR}/META-INF/services/org.yamcs.Plugin
    echo "com.example.myproject.ServicesPlugin" >> ${BUILD_DIR}/META-INF/services/org.yamcs.Plugin
    for PLUGIN in com.example.myproject.JupyterPlugin com.example.myproject.ServicesPlugin; do
      mkdir -p ${BUILD_DIR}/META-INF/yamcs/${PLUGIN}
      printf "name=myproject\nversion=1.0.0-SNAPSHOT\n" > ${BUILD_DIR}/META-INF/yamcs/${PLUGIN}/plugin.properties
    done
    javac -cp "/opt/yamcs/lib/*" -d ${BUILD_DIR} /opt/yamcs/decoders/*.java
    jar cf /opt/yamcs/lib/ext/mission-decoders.jar -C ${BUILD_DIR} .
    rm -rf ${BUILD_DIR}
    echo "Mission decoders compiled successfully."
  fi

  # Start yamcsd
  mkdir -p /opt/yamcs/var/run
  /opt/yamcs/bin/yamcsd --etc-dir /opt/yamcs/etc --data-dir /opt/yamcs/yamcs-data &
  echo $! > /opt/yamcs/var/run/pid
  tail -f /dev/null

env:
  HTTPS_PROXY: ""
  HTTP_PROXY: ""
  NO_PROXY: ""
  DEPLOYMENT_ENVIRO: ""

service:
  type: ClusterIP
  port: 8090
  additionalPorts:
    - name: tm-udp
      port: 10015
      protocol: UDP
    - name: tc-udp
      port: 10025
      protocol: UDP

# Volumes — standard Yamcs layout, enabled by default.
# Missions can override size, type, or disable individual volumes.
#
# Supported keys per volume:
#   enabled:     bool
#   mountPath:   container path
#   type:        emptyDir | pvc | configMap
#   subPath:     single-file mount key (optional)
#   size:        PVC size (pvc type, default 100Mi)
#   accessMode:  PVC access mode (pvc type, default ReadWriteOnce)
#   defaultMode: file permissions (configMap type, optional)
#   data:        inline content map (configMap type, optional)
volumes:
  # PVC volumes — persistent data loaded post-deploy
  mdb:
    enabled: true
    mountPath: /opt/yamcs/mdb
    type: pvc
    size: 100Mi
  etc:
    enabled: true
    mountPath: /opt/yamcs/etc
    type: pvc
    size: 100Mi
  incoming:
    enabled: true
    mountPath: /opt/yamcs/incoming
    type: pvc
    size: 100Mi
  displays:
    enabled: true
    mountPath: /opt/yamcs/displays
    type: pvc
    size: 100Mi

  # emptyDir volumes — ephemeral, loaded post-deploy
  scripts:
    enabled: true
    mountPath: /opt/yamcs/scripts
    type: emptyDir
  functions:
    enabled: true
    mountPath: /opt/yamcs/functions
    type: emptyDir
  decoders:
    enabled: true
    mountPath: /opt/yamcs/decoders
    type: emptyDir
  log:
    enabled: true
    mountPath: /opt/yamcs/log
    type: emptyDir
  yamcs-data:
    enabled: true
    mountPath: /opt/yamcs/yamcs-data
    type: emptyDir
  cache:
    enabled: true
    mountPath: /opt/yamcs/cache
    type: emptyDir

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  supplementalGroups: [10000]

healthCheck:
  httpGet:
    path: /
    port: 8090
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

resources:
  requests:
    cpu: "500m"
    memory: "1024Mi"
  limits:
    cpu: "2"
    memory: "2048Mi"

nodeSelector: {}
tolerations: []
affinity: {}

initContainers: []
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: yamcs.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
