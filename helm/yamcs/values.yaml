replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/yamcs
  tag: latest
  pullPolicy: IfNotPresent

env:
  MAVEN_HTTPS_PROXY: ""
  HTTPS_PROXY: ""
  HTTP_PROXY: ""
  NO_PROXY: ""
  DEPLOYMENT_ENVIRO: ""

service:
  type: ClusterIP
  port: 8090

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: yamcs.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
