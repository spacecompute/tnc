apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openmct.fullname" . }}
  labels:
    {{- include "openmct.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openmct.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openmct.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: openmct
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ .Values.command | toJson }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- range .Values.service.additionalPorts }}
            - name: {{ .name }}
              containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.healthCheck }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: entrypoint
              mountPath: /entrypoint.sh
              subPath: entrypoint.sh
            {{- range $name, $vol := .Values.volumes }}
            {{- if $vol.enabled }}
            - name: {{ $name }}
              mountPath: {{ $vol.mountPath }}
              {{- if $vol.subPath }}
              subPath: {{ $vol.subPath }}
              {{- end }}
            {{- end }}
            {{- end }}
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: entrypoint
          configMap:
            name: {{ include "openmct.fullname" . }}-entrypoint
            defaultMode: 0755
        {{- range $name, $vol := .Values.volumes }}
        {{- if $vol.enabled }}
        {{- if eq ($vol.type | default "emptyDir") "emptyDir" }}
        - name: {{ $name }}
          emptyDir: {}
        {{- else if eq $vol.type "pvc" }}
        - name: {{ $name }}
          persistentVolumeClaim:
            claimName: {{ include "openmct.fullname" $ }}-{{ $name }}
        {{- else if eq $vol.type "configMap" }}
        - name: {{ $name }}
          configMap:
            name: {{ include "openmct.fullname" $ }}-{{ $name }}
            {{- if $vol.defaultMode }}
            defaultMode: {{ $vol.defaultMode }}
            {{- end }}
            {{- if $vol.subPath }}
            items:
              - key: {{ $vol.subPath }}
                path: {{ $vol.subPath }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- end }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
