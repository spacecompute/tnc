replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/openmct
  tag: latest
  pullPolicy: IfNotPresent

command: ["/entrypoint.sh"]

entrypoint: |
  #!/usr/bin/env bash
  [ -n "${SHARED_GID}" ] && umask 0002
  cd /opt/openmct
  pkill -f node
  pkill -f npm
  npm start
  tail -f /dev/null

env:
  MAVEN_HTTPS_PROXY: ""
  HTTPS_PROXY: ""
  HTTP_PROXY: ""
  NO_PROXY: ""
  DEPLOYMENT_ENVIRO: ""
  YAMCS_HOST: yamcs
  YAMCS_HOST_PORT: "8090"
  YAMCS_INSTANCE: myproject
  YAMCS_PROCESSOR: realtime
  YAMCS_FOLDER: myproject

service:
  type: ClusterIP
  port: 9000
  additionalPorts: []

# Volumes — each entry supports:
#   enabled:     bool (default false)
#   mountPath:   container path (required)
#   type:        emptyDir | pvc | configMap (default emptyDir)
#   subPath:     single-file mount key (optional)
#   size:        PVC size (pvc type, default 100Mi)
#   accessMode:  PVC access mode (pvc type, default ReadWriteOnce)
#   defaultMode: file permissions (configMap type, optional)
#   data:        inline content map (configMap type, optional)
volumes: {}

podSecurityContext:
  runAsUser: 10002
  runAsGroup: 10002
  fsGroup: 10002
  supplementalGroups: [10000]
  runAsNonRoot: true

healthCheck:
  httpGet:
    path: /
    port: 9000
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 30

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1024Mi"

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: openmct.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
