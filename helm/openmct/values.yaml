replicaCount: 1

image:
  repository: ghcr.io/spacecompute/mission-control-systems/openmct
  tag: latest
  pullPolicy: IfNotPresent

command: ["/entrypoint.sh"]

entrypoint: |
  #!/usr/bin/env bash
  cd /opt/openmct
  pkill -f node
  pkill -f npm
  npm start
  tail -f /dev/null

env:
  MAVEN_HTTPS_PROXY: ""
  HTTPS_PROXY: ""
  HTTP_PROXY: ""
  NO_PROXY: ""
  DEPLOYMENT_ENVIRO: ""
  YAMCS_INSTANCE: myproject
  YAMCS_PROCESSOR: realtime
  YAMCS_FOLDER: myproject

service:
  type: ClusterIP
  port: 9000
  additionalPorts: []

# Volumes — each entry supports:
#   enabled:     bool (default false)
#   mountPath:   container path (required)
#   type:        emptyDir | pvc | configMap (default emptyDir)
#   subPath:     single-file mount key (optional)
#   size:        PVC size (pvc type, default 100Mi)
#   accessMode:  PVC access mode (pvc type, default ReadWriteOnce)
#   defaultMode: file permissions (configMap type, optional)
#   data:        inline content map (configMap type, optional)
volumes: {}

healthCheck: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
