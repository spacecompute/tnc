version: '3'

env:
  TZ: UTC
  
vars:
  CONTAINER_BIN: docker
  REGISTRY_HOST: ghcr.io
  VERSION_TIMESTAMP:
    sh: date -u +'%Y.%j.%H%M%SZ'
  IMAGE_PREFIX:
    sh: echo "{{.REGISTRY_HOST}}/$(git remote get-url origin | sed 's|.*github.com[:/]||; s|\.git$||')"
  # act — run GitHub Actions locally: https://github.com/nektos/act
  WORKFLOW: .github/workflows/build-images.yaml
  ACT_IMAGE: catthehacker/ubuntu:act-latest
  ACT_FLAGS: >-
    -P ubuntu-latest={{.ACT_IMAGE}}
    -P ubuntu-24.04-arm={{.ACT_IMAGE}}
    --matrix runner:ubuntu-24.04-arm
    -v

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build all images locally
    deps:
      - task: build:yamcs
      - task: build:openmct
      - task: build:jupyter
      - task: build:sle

  build:yamcs:
    desc: Build yamcs image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/yamcs:latest
        -t {{.IMAGE_PREFIX}}/yamcs:{{.VERSION_TIMESTAMP}}
        -f containers/yamcs/Containerfile
        containers/yamcs

  build:openmct:
    desc: Build openmct image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/openmct:latest
        -t {{.IMAGE_PREFIX}}/openmct:{{.VERSION_TIMESTAMP}}
        -f containers/openmct/Containerfile
        containers/openmct

  build:jupyter:
    desc: Build jupyter image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/jupyter:latest
        -t {{.IMAGE_PREFIX}}/jupyter:{{.VERSION_TIMESTAMP}}
        -f containers/jupyter/Containerfile
        containers/jupyter

  build:sle:
    desc: Build sle image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/sle:latest
        -t {{.IMAGE_PREFIX}}/sle:{{.VERSION_TIMESTAMP}}
        -f containers/sle/Containerfile
        containers/sle

  helm:lint:
    desc: Lint all Helm charts
    cmds:
      - helm lint helm/yamcs helm/openmct helm/jupyter helm/sle helm/mission-control

  helm:lint:yamcs:
    desc: Lint yamcs chart
    cmds:
      - helm lint helm/yamcs

  helm:lint:openmct:
    desc: Lint openmct chart
    cmds:
      - helm lint helm/openmct

  helm:lint:jupyter:
    desc: Lint jupyter chart
    cmds:
      - helm lint helm/jupyter

  helm:lint:sle:
    desc: Lint sle chart
    cmds:
      - helm lint helm/sle

  helm:deps:mission-control:
    desc: Update Helm chart dependencies for umbrella chart
    cmds:
      - helm dependency update helm/mission-control

  helm:package:mission-control:
    desc: Package mission-control umbrella chart
    deps: [helm:lint, helm:deps:mission-control]
    cmds:
      - helm dependency update helm/mission-control
      - helm package helm/mission-control -d dist/

  helm:package:
    desc: Package mission-control umbrella chart
    deps: [helm:lint, helm:package:mission-control]
    cmds:
      - |
        helm package helm/sle -d dist/
        helm package helm/yamcs -d dist/
        helm package helm/openmct -d dist/
        helm package helm/jupyter -d dist/

  helm:template:
    desc: Render all chart templates locally
    cmds:
      - helm template yamcs helm/yamcs
      - helm template openmct helm/openmct
      - helm template jupyter helm/jupyter
      - helm template sle helm/sle
      - helm dependency build helm/mission-control
      - helm template mission-control helm/mission-control

  act:charts:
    desc: Run publish-charts workflow locally via act (lint job only)
    cmds:
      - >-
        act -j lint
        -W .github/workflows/publish-charts.yaml
        -P ubuntu-latest={{.ACT_IMAGE}}
        -v

  act:charts:dry:
    desc: Dry-run publish-charts workflow locally via act
    cmds:
      - >-
        act -j lint
        -W .github/workflows/publish-charts.yaml
        -P ubuntu-latest={{.ACT_IMAGE}}
        -n

  act:build:
    desc: Run build-images workflow locally via act
    cmds:
      - >-
        act
        -W {{.WORKFLOW}}
        {{.ACT_FLAGS}}

  act:build:dry:
    desc: Dry-run build-images workflow via act
    cmds:
      - >-
        act
        -W {{.WORKFLOW}}
        {{.ACT_FLAGS}}
        -n
