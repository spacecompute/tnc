version: '3'

vars:
  WORKFLOW: .github/workflows/build-images.yaml
  ACT_IMAGE: catthehacker/ubuntu:act-latest
  ACT_FLAGS: >-
    -P ubuntu-latest={{.ACT_IMAGE}}
    -P ubuntu-24.04-arm={{.ACT_IMAGE}}
    --matrix runner:ubuntu-24.04-arm
    -v

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build all images locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}}

  build:yamcs:
    desc: Build yamcs image locally
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:yamcs

  build:openmct:
    desc: Build openmct image locally
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:openmct

  build:jupyter:
    desc: Build jupyter image locally
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:jupyter

  build:sle:
    desc: Build sle image locally
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:sle

  build:dry:
    desc: Dry-run — validate workflow without building
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --dryrun

  graph:
    desc: Show workflow graph
    cmds:
      - act push -W {{.WORKFLOW}} --graph

  helm:lint:
    desc: Lint all Helm charts
    cmds:
      - helm lint helm/yamcs helm/openmct helm/jupyter helm/sle

  helm:lint:yamcs:
    desc: Lint yamcs chart
    cmds:
      - helm lint helm/yamcs

  helm:lint:openmct:
    desc: Lint openmct chart
    cmds:
      - helm lint helm/openmct

  helm:lint:jupyter:
    desc: Lint jupyter chart
    cmds:
      - helm lint helm/jupyter

  helm:lint:sle:
    desc: Lint sle chart
    cmds:
      - helm lint helm/sle

  helm:template:
    desc: Render all chart templates locally
    cmds:
      - helm template yamcs helm/yamcs
      - helm template openmct helm/openmct
      - helm template jupyter helm/jupyter
      - helm template sle helm/sle
