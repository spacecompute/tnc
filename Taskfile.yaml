version: '3'

vars:
  CONTAINER_BIN: docker
  IMAGE_PREFIX:
    sh: echo "ghcr.io/$(git remote get-url origin | sed 's|.*github.com[:/]||; s|\.git$||')"
  # act — run GitHub Actions locally: https://github.com/nektos/act
  WORKFLOW: .github/workflows/build-images.yaml
  ACT_IMAGE: catthehacker/ubuntu:act-latest
  ACT_FLAGS: >-
    -P ubuntu-latest={{.ACT_IMAGE}}
    -P ubuntu-24.04-arm={{.ACT_IMAGE}}
    --matrix runner:ubuntu-24.04-arm
    -v

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build all images locally
    deps:
      - task: build:yamcs
      - task: build:openmct
      - task: build:jupyter
      - task: build:sle

  build:yamcs:
    desc: Build yamcs image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/yamcs:latest
        -f containers/yamcs/Containerfile
        containers/yamcs

  build:openmct:
    desc: Build openmct image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/openmct:latest
        -f containers/openmct/Containerfile
        containers/openmct

  build:jupyter:
    desc: Build jupyter image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/jupyter:latest
        -f containers/jupyter/Containerfile
        containers/jupyter

  build:sle:
    desc: Build sle image
    cmds:
      - >-
        {{.CONTAINER_BIN}} build
        -t {{.IMAGE_PREFIX}}/sle:latest
        -f containers/sle/Containerfile
        containers/sle

  act:build:
    desc: Build all images locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}}

  act:build:yamcs:
    desc: Build yamcs image locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:yamcs

  act:build:openmct:
    desc: Build openmct image locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:openmct

  act:build:jupyter:
    desc: Build jupyter image locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:jupyter

  act:build:sle:
    desc: Build sle image locally via act
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --matrix image:sle

  act:build:dry:
    desc: Dry-run — validate workflow without building
    cmds:
      - act push -W {{.WORKFLOW}} -j build {{.ACT_FLAGS}} --dryrun

  act:graph:
    desc: Show workflow graph
    cmds:
      - act push -W {{.WORKFLOW}} --graph

  helm:lint:
    desc: Lint all Helm charts
    cmds:
      - helm lint helm/yamcs helm/openmct helm/jupyter helm/sle

  helm:lint:yamcs:
    desc: Lint yamcs chart
    cmds:
      - helm lint helm/yamcs

  helm:lint:openmct:
    desc: Lint openmct chart
    cmds:
      - helm lint helm/openmct

  helm:lint:jupyter:
    desc: Lint jupyter chart
    cmds:
      - helm lint helm/jupyter

  helm:lint:sle:
    desc: Lint sle chart
    cmds:
      - helm lint helm/sle

  helm:template:
    desc: Render all chart templates locally
    cmds:
      - helm template yamcs helm/yamcs
      - helm template openmct helm/openmct
      - helm template jupyter helm/jupyter
      - helm template sle helm/sle
